<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft PvP Tier List</title>
<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{margin-bottom:10px}

.lockinfo{
margin-bottom:20px;
color:#94a3b8;
}

.controls{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:25px;
}

input,select,button{
padding:8px;
margin:4px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{background:#2563eb}

button:disabled{
background:#475569;
cursor:not-allowed;
}

.tierlist{
display:flex;
flex-direction:column;
gap:10px;
}

.tier-row{
display:flex;
align-items:center;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.tier-label{
width:90px;
font-weight:bold;
text-align:center;
padding:15px 0;
font-size:18px;
}

.tier-players{
flex:1;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.player{
display:flex;
align-items:center;
gap:6px;
padding:4px 8px;
background:#334155;
border-radius:6px;
font-size:14px;
}

.player img{
width:20px;
height:20px;
border-radius:4px;
}

.removeBtn{
margin-left:6px;
background:#ef4444;
font-size:12px;
padding:2px 6px;
border-radius:4px;
}

.ht{background:#ef4444}
.lt{background:#22c55e}

</style>
</head>
<body>

<h1>Minecraft PvP Tier List</h1>
<div class="lockinfo">Viewer mode by default. Enter password to edit tiers.</div>

<button onclick="unlock()" id="unlockBtn">Enter Edit Password</button>

<div class="controls">

<div>
<input id="playerName" placeholder="Player name" disabled>
<button onclick="addPlayer()" id="addPlayerBtn" disabled>Add Player</button>
</div>

<div>
<select id="playerSelect" disabled></select>
<select id="tierSelect" disabled></select>
<button onclick="assignTier()" id="assignBtn" disabled>Assign</button>
</div>

</div>

<div class="tierlist" id="tiers"></div>

<script>

const PASSWORD = "Pk37"
let unlocked = false

let players=[]

let tierOrder=[
"HT1","LT1",
"HT2","LT2",
"HT3","LT3",
"HT4","LT4",
"HT5","LT5"
]

let tiers={}

function load(){

let savedPlayers = localStorage.getItem("players")
let savedTiers = localStorage.getItem("tiers")

if(savedPlayers){
players = JSON.parse(savedPlayers)
}

if(savedTiers){
tiers = JSON.parse(savedTiers)
}else{
tierOrder.forEach(t=>tiers[t]=[])
}

refreshSelectors()
}

function save(){
localStorage.setItem("players", JSON.stringify(players))
localStorage.setItem("tiers", JSON.stringify(tiers))
}

function unlock(){
let input = prompt("Enter password to edit tiers")

if(input === PASSWORD){

unlocked = true

 document.getElementById("playerName").disabled=false
 document.getElementById("addPlayerBtn").disabled=false
 document.getElementById("playerSelect").disabled=false
 document.getElementById("tierSelect").disabled=false
 document.getElementById("assignBtn").disabled=false

 document.getElementById("unlockBtn").innerText="Editing Enabled"
 document.getElementById("unlockBtn").disabled=true

}else{
alert("Wrong password")
}
}

function refreshSelectors(){
let ps=document.getElementById("playerSelect")
let ts=document.getElementById("tierSelect")

ps.innerHTML=""
ts.innerHTML=""

players.forEach(p=>{
let o=document.createElement("option")
o.value=p
 o.text=p
ps.appendChild(o)
})

tierOrder.forEach(t=>{
let o=document.createElement("option")
o.value=t
 o.text=t
 ts.appendChild(o)
})

render()
}

function addPlayer(){
if(!unlocked) return

let name=document.getElementById("playerName").value.trim()
if(!name)return

if(!players.includes(name)){
players.push(name)
}

 document.getElementById("playerName").value=""

save()
refreshSelectors()
}

function assignTier(){
if(!unlocked) return

let player=document.getElementById("playerSelect").value
let tier=document.getElementById("tierSelect").value

if(!player || !tier) return

Object.keys(tiers).forEach(t=>{
tiers[t]=tiers[t].filter(p=>p!==player)
})

tiers[tier].push(player)

save()
render()
}

function removePlayer(player,tier){
if(!unlocked) return

 tiers[tier] = tiers[tier].filter(p=>p!==player)

save()
render()
}

function render(){
let container=document.getElementById("tiers")
container.innerHTML=""

 tierOrder.forEach(tier=>{

let row=document.createElement("div")
row.className="tier-row"

let label=document.createElement("div")

if(tier.startsWith("HT")){
label.className="tier-label ht"
}else{
label.className="tier-label lt"
}

label.textContent=tier

let playersDiv=document.createElement("div")
playersDiv.className="tier-players"

 tiers[tier].forEach(player=>{

let p=document.createElement("div")
p.className="player"

let head=document.createElement("img")
head.src=`https://mc-heads.net/avatar/${player}`

let name=document.createElement("span")
name.textContent=player

p.appendChild(head)
p.appendChild(name)

if(unlocked){
let remove=document.createElement("button")
remove.className="removeBtn"
remove.innerText="x"
remove.onclick=()=>removePlayer(player,tier)
p.appendChild(remove)
}

playersDiv.appendChild(p)
})

row.appendChild(label)
row.appendChild(playersDiv)
container.appendChild(row)

})
}

load()

</script>

</body>
</html>
